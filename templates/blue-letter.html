<!-- Opened layout -->
<div id="opened-layout">
  <div id="env-static"></div>
  <div id="pages-stack">

    {% for page in pages %}
    <div class="page-card" data-index="{{ loop.index }}">
      <div class="page-content">
        {% if page[0] %}
          <div class="image-wrapper">
            <img src="{{ page[0] }}" alt="clue image" class="page-image"/>
          </div>
        {% endif %}
        {% if page[1] %}
        <div class="page-text-container">
          <p class="page-text" data-text="{{ page[1] }}"></p>
        </div>
        {% endif %}
      </div>
      <div class="page-footer">
        <span class="page-number">{{ loop.index }}/{{ pages|length + 1 }}</span>
        <button class="nav-back" onclick="goBack(event)"></button>
      </div>
    </div>
    {% endfor %}

    <!-- Photo page -->
    <div class="page-card photo-page" data-index="{{ pages|length }}">
      <div class="page-content">
        <div class="photo-placeholder" id="photo-placeholder" onclick="triggerUpload()"></div>
        <div class="photo-result" id="photo-result">
          <img id="photo-img" src="" alt=""/>
          <button class="complete-btn" id="complete-btn" onclick="handleComplete()">COMPLETE</button>
          <button class="replace-btn"  onclick="triggerUpload()">REPLACE</button>
        </div>
        <p class="upload-status" id="upload-status"></p>
      </div>
      <div class="page-footer">
        <span class="page-number">{{ pages|length + 1 }}/{{ pages|length + 1 }}</span>
        <button class="nav-back" onclick="goBack(event)" style="display:block;"></button>
      </div>
    </div>

  </div>
</div>

<!-- Final reveal: framed image -->
<div id="final-reveal">
  <div id="framed-image-wrap">
    <img id="final-img" src="" alt=""/>
    <canvas id="frame-canvas"></canvas>
  </div>
</div>

<input type="file" id="photo-input" accept="image/*"/>

<script>
/* ════════════════════════════════════════════════════
   SIZING
════════════════════════════════════════════════════ */
function applySize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const envW = Math.min(Math.max(vw * .80, 260), 600);
  const envH = envW * (200 / 320);

  // Page ratio is 2:3 (width:height). Derive from width cap first,
  // then check if the resulting height fits; if not, derive from height cap instead.
  const maxPgW = Math.min(Math.round(vw * .70), 400);
  const maxPgH = 600;

  let pgW = maxPgW;
  let pgH = Math.round(pgW * 3 / 2);   // 2:3 ratio

  // If height exceeds cap, constrain by height instead
  if (pgH > maxPgH) {
    pgH = maxPgH;
    pgW = Math.round(pgH * 2 / 3);
  }

  // Envelope peek: only the left ~15% of the envelope is visible beside the pages
  const envPeek = Math.round(envW * .15);

  document.documentElement.style.setProperty('--env-w',    envW    + 'px');
  document.documentElement.style.setProperty('--env-h',    envH    + 'px');
  document.documentElement.style.setProperty('--page-w',   pgW     + 'px');
  document.documentElement.style.setProperty('--page-h',   pgH     + 'px');
  document.documentElement.style.setProperty('--env-peek', envPeek + 'px');
}
applySize();
window.addEventListener('resize', applySize);

/* ── Stars ───────────────────────────────────────── */
const starsEl = document.getElementById('stars');
for (let i = 0; i < 200; i++) {
  const s = document.createElement('div');
  const lg = Math.random() > .85;
  s.className = 'star'+(lg?' lg':'');
  const sz = lg ? [3,4][Math.floor(Math.random()*2)] : [1,1,2][Math.floor(Math.random()*3)];
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${(Math.random()*100).toFixed(2)}%;left:${(Math.random()*100).toFixed(2)}%;--dur:${[.8,1,1.5,2,2.5,3][Math.floor(Math.random()*6)]}s;--del:-${(Math.random()*4).toFixed(2)}s;--op:${[.4,.6,.8,1][Math.floor(Math.random()*4)]};`;
  starsEl.appendChild(s);
}

/* ── Sparkles (canvas pixel stars) ──────────────── */
const PALETTES = [
  ['#1838a8','#2050d0','#3870e8','#5898f8','#88c0ff','#b8d8ff'],
  ['#1a42b8','#2558d8','#3c78f0','#62a0ff','#90c4ff','#c0e0ff'],
  ['#1c3c9a','#2850c0','#3c6cdc','#5890f4','#80b8ff','#aed4ff'],
  ['#2048c8','#3060e0','#4880f0','#70a8ff','#98c4ff','#c8e0ff'],
  ['#1450c0','#2268e0','#3888f4','#5ca8ff','#88c8ff','#b8e0ff'],
  ['#0c2c8c','#1840b0','#2c60d0','#4882e8','#72aaff','#a8ccff'],
];

const spHost = document.getElementById('sparkle-host');
function buildSparkles() {
  spHost.innerHTML = '';
  const envW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--env-w'));
  const baseR = envW * .62;
  const px = Math.max(2, Math.round(envW * .009));
  const defs = [
    {pi:0,rM:.78,spd:8,sz:2},{pi:1,rM:.94,spd:11,sz:1},{pi:2,rM:.70,spd:7,sz:2},
    {pi:3,rM:.86,spd:12,sz:1},{pi:4,rM:1.0,spd:9,sz:2},{pi:5,rM:.75,spd:14,sz:1},
    {pi:0,rM:.92,spd:6.5,sz:2},{pi:1,rM:.82,spd:13,sz:1},{pi:2,rM:.65,spd:10,sz:2},
    {pi:3,rM:1.05,spd:8,sz:1},{pi:4,rM:.72,spd:15,sz:2},{pi:5,rM:1.1,spd:9.5,sz:1},
  ];
  defs.forEach((d,idx) => {
    const pal = PALETTES[d.pi];
    const p = px * d.sz;
    const w = p * 11;
    const cvs = document.createElement('canvas');
    cvs.width = cvs.height = w; cvs.className = 'sp-canvas';
    const r = Math.round(baseR * d.rM);
    cvs.style.cssText = `width:${w}px;height:${w}px;margin-left:-${w/2}px;margin-top:-${w/2}px;--r:${r}px;--spd:${d.spd}s;--del:-${(Math.random()*d.spd).toFixed(2)}s;`;
    const ctx = cvs.getContext('2d');
    const cx = cy = w/2;
    function drawStar(pal) {
      ctx.clearRect(0,0,w,w);
      const sp = (c,gx,gy) => { ctx.fillStyle=c; ctx.fillRect(cx+gx*p,cy+gy*p,p,p); };
      sp(pal[5],0,0);
      sp(pal[4],-1,0); sp(pal[4],1,0); sp(pal[4],0,-1); sp(pal[4],0,1);
      sp(pal[3],-2,0); sp(pal[3],2,0); sp(pal[3],0,-2); sp(pal[3],0,2);
      sp(pal[2],-3,0); sp(pal[2],3,0); sp(pal[2],0,-3); sp(pal[2],0,3);
      sp(pal[3],-1,-1); sp(pal[3],1,-1); sp(pal[3],-1,1); sp(pal[3],1,1);
      sp(pal[2],-2,-2); sp(pal[2],2,-2); sp(pal[2],-2,2); sp(pal[2],2,2);
      sp(pal[1],-4,0); sp(pal[1],4,0); sp(pal[1],0,-4); sp(pal[1],0,4);
      sp(pal[1],-3,-1); sp(pal[1],3,-1); sp(pal[1],-3,1); sp(pal[1],3,1);
      sp(pal[1],-1,-3); sp(pal[1],1,-3); sp(pal[1],-1,3); sp(pal[1],1,3);
    }
    let h = (idx/defs.length)*360;
    const hs = .3+Math.random()*.5;
    function anim() {
      h=(h+hs)%360;
      const si = Math.floor((h/360)*pal.length);
      const sp = [...pal.slice(si),...pal.slice(0,si)];
      drawStar(sp);
      requestAnimationFrame(anim);
    }
    drawStar(pal);
    requestAnimationFrame(anim);
    spHost.appendChild(cvs);
  });
}
buildSparkles();
window.addEventListener('resize', buildSparkles);

/* ════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════ */
const envWrap      = document.getElementById('env-wrap');
const spHostEl     = document.getElementById('sparkle-host');
const sceneEl      = document.getElementById('scene');
const openedLayout = document.getElementById('opened-layout');
const envStatic    = document.getElementById('env-static');
const bloom        = document.getElementById('light-bloom');
const pagesEl      = [...document.querySelectorAll('.page-card')];
const totalPages   = pagesEl.length;
let state          = 'idle';
let currentPage    = 0;
const pageReady    = new Array(totalPages).fill(false);

// Typing is deferred until the opening bloom has fully faded
let bloomDone      = false;
let pendingTypeIdx = -1;   // page index waiting to start typing

/* ════════════════════════════════════════════════════
   BACKGROUND IMAGE AND ENVELOPE ENTRANCE
════════════════════════════════════════════════════ */
const bgImage = document.getElementById('background-image');
const backgroundUrl = document.body.dataset.backgroundUrl;
if (backgroundUrl) {
  bgImage.style.backgroundImage = `url('${backgroundUrl}')`;
}

// Hide envelope initially, fade in after 2 seconds
envWrap.style.opacity = '0';
envWrap.style.transition = 'opacity 1.2s ease-in-out';
setTimeout(() => {
  envWrap.style.opacity = '1';
}, 2000);

function handleClick() {
  if (state==='idle')        openEnvelope();
  else if (state==='paging') attemptNextPage();
}

/* ── Open envelope ────────────────────────────────── */
function openEnvelope() {
  state = 'opening';
  bloomDone = false;
  pendingTypeIdx = -1;

  // Fade sparkles out smoothly
  spHostEl.classList.add('fading');

  envWrap.classList.add('opening');

  // Fire the soft full-screen light bloom
  setTimeout(() => {
    bloom.classList.remove('explode');
    bloom.classList.add('fire');

    // When bloom fully fades out, mark bloomDone and start any pending typewrite
    bloom.addEventListener('animationend', () => {
      bloom.classList.remove('fire');
      bloomDone = true;
      if (pendingTypeIdx >= 0) {
        const idx = pendingTypeIdx;
        pendingTypeIdx = -1;
        typewritePage(idx);
      }
      // Close flap after the light fades
      const sf = envStatic.querySelector('#flap');
      if (sf) {
        sf.style.transition = 'transform 1.1s cubic-bezier(.4,0,.2,1)';
        sf.style.transformOrigin = '160px 24px';
        sf.style.transform = 'rotateX(0deg)';
      }
    }, {once: true});
  }, 300);

  // Transition to opened layout mid-bloom so pages are ready underneath
  setTimeout(() => {
    envWrap.classList.remove('opening');
    envWrap.classList.add('opened');
    transitionToOpenLayout();
  }, 1100);
}

/* ── Layout switch ──────────────────────────────────── */
function transitionToOpenLayout() {
  const envW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--env-w'));
  const envH = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--env-h'));
  const pgW  = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--page-w'));
  const pgH  = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--page-h'));

  const svgClone = document.getElementById('envelope-svg').cloneNode(true);
  svgClone.id = ''; svgClone.style.cssText='width:100%;height:100%;shape-rendering:crispEdges;overflow:visible;position:absolute;inset:0;';
  const cf = svgClone.querySelector('#flap');
  if (cf) { cf.style.transform='rotateX(-174deg)'; cf.style.transformOrigin='160px 24px'; cf.style.transition='none'; }
  envStatic.innerHTML=''; envStatic.appendChild(svgClone);
  envStatic.style.cssText=`width:${envW}px;height:${envH}px;flex-shrink:0;position:relative;`;

  const stack = document.getElementById('pages-stack');
  stack.style.cssText=`width:${pgW}px;height:${pgH}px;flex-shrink:0;position:relative;`;

  const peek  = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--env-peek'));
  // marginRight hides the non-peeking portion of the envelope behind the pages
  envStatic.style.marginRight = `-${Math.round(envW - peek)}px`;
  envStatic.style.zIndex='1'; stack.style.zIndex='2';

  sceneEl.style.display='none';
  openedLayout.classList.add('active');
  risePages();
}

/* ── Rise pages ───────────────────────────────────── */
function risePages() {
  pagesEl.forEach((p,i)=>{ p.style.zIndex=totalPages-i; });
  setTimeout(() => {
    showPage(0);
    for (let i=1;i<totalPages;i++) {
      setTimeout(()=>{
        pagesEl[i].style.transform=`translateX(${i*5}px) translateY(${i*6}px)`;
        pagesEl[i].style.opacity='1';
        pagesEl[i].style.transition='transform .4s ease,opacity .3s ease';
      }, i*100);
    }
  }, 150);
}

/* ── Show page + typewrite ────────────────────────── */
function showPage(idx) {
  const pg = pagesEl[idx];
  pg.style.transition='none';
  pg.classList.add('rise');
  pg.addEventListener('animationend', () => {
    pg.classList.add('active');
    const back = pg.querySelector('.nav-back');
    if (back) back.style.display = idx>0?'block':'none';
    if (!pg.classList.contains('photo-page')) {
      if (!pageReady[idx]) {
        // Only start typing once the opening bloom has fully faded
        if (bloomDone) {
          typewritePage(idx);
        } else {
          // Park the index; bloom animationend will start it
          pendingTypeIdx = idx;
          state = 'typing'; // block forward navigation while waiting
        }
      } else {
        // Already fully typed — show as-is, allow navigation
        pg.style.cursor='pointer';
        state='paging';
      }
    } else {
      pg.style.cursor='default'; state='paging';
    }
  }, {once:true});
}

/* ── Typewriter ───────────────────────────────────── */
function typewritePage(pidx) {
  state='typing';
  const pg = pagesEl[pidx];
  const textEl = pg.querySelector('.page-text');
  const textContainer = pg.querySelector('.page-text-container');
  if (!textEl) { pageReady[pidx]=true; pg.style.cursor='pointer'; state='paging'; return; }
  
  const txt = textEl.dataset.text || '';
  let ci = 0;
  textEl.textContent = '';
  let cur = document.createElement('span'); cur.className='cursor';
  textEl.appendChild(cur);
  
  function next() {
    if(ci >= txt.length) { cur.remove(); pageReady[pidx]=true; pg.style.cursor='pointer'; state='paging'; return; }
    textEl.insertBefore(document.createTextNode(txt[ci]), cur);
    ci++;
    // Auto-scroll as text types
    if(textContainer) {
      textContainer.scrollTop = textContainer.scrollHeight;
    }
    setTimeout(next, txt[ci-1]===' '?40:28+Math.random()*20);
  }
  setTimeout(next, 200);
}

function attemptNextPage() {
  if(state!=='paging') return;
  if(pagesEl[currentPage].classList.contains('photo-page')) return;
  goForward();
}

/* ── Forward ─────────────────────────────────────── */
function goForward() {
  if(state!=='paging') return;
  const cur=currentPage, next=currentPage+1;
  if(next>=totalPages){ closeAllPages(); return; }
  state='transition';
  pagesEl[cur].classList.remove('active'); pagesEl[cur].classList.add('exit'); pagesEl[cur].style.cursor='default';
  pagesEl[cur].addEventListener('animationend',()=>{
    pagesEl[cur].classList.remove('exit','rise');
    pagesEl[cur].style.opacity='1'; pagesEl[cur].style.transition='none'; pagesEl[cur].style.zIndex='1';
    pagesEl[cur].style.transform=`translateX(${(totalPages-1)*5}px) translateY(${(totalPages-1)*6}px)`;
    currentPage=next; restack(next); showPage(next);
  },{once:true});
}

/* ── Back ────────────────────────────────────────── */
function goBack(e) {
  e.stopPropagation();
  if(state!=='paging'&&state!=='typing') return;
  if(currentPage===0) return;
  state='transition';
  const cur=currentPage, prev=currentPage-1;
  pagesEl[cur].classList.remove('active'); pagesEl[cur].classList.add('exit'); pagesEl[cur].style.cursor='default';
  pagesEl[cur].addEventListener('animationend',()=>{
    pagesEl[cur].classList.remove('exit','rise');
    pagesEl[cur].style.opacity='1'; pagesEl[cur].style.transition='none';
    pagesEl[cur].style.zIndex='1'; pagesEl[cur].style.transform=`translateX(${(totalPages-1)*5}px) translateY(${(totalPages-1)*6}px)`;
    currentPage=prev;
    restack(prev);
    // Show prev page — if already typed, showPage will detect pageReady[prev]===true
    // and skip the typewriter, showing the text immediately as-is
    showPage(prev);
  },{once:true});
}

/* ── Close pages → flap closes ───────────────────── */
function closeAllPages() {
  pagesEl.forEach(p=>{ p.style.transition='opacity .3s ease'; p.style.opacity='0'; p.style.pointerEvents='none'; });
  setTimeout(()=>{
    const sf=envStatic.querySelector('#flap');
    if(sf){ sf.style.transition='transform 1.1s cubic-bezier(.4,0,.2,1)'; sf.style.transformOrigin='160px 24px'; sf.style.transform='rotateX(0deg)'; }
    state='done';
  },350);
}

function restack(ti) {
  for(let i=0;i<totalPages;i++){
    const rel=(i-ti+totalPages)%totalPages;
    pagesEl[i].style.zIndex=totalPages-rel;
    if(i!==ti){ pagesEl[i].style.transition='transform .3s ease'; pagesEl[i].style.transform=`translateX(${rel*5}px) translateY(${rel*6}px)`; }
  }
}

/* ── Page stack click ────────────────────────────── */
document.getElementById('pages-stack').addEventListener('click',(e)=>{
  if(e.target.closest('.nav-back')) return;
  if(e.target.closest('.photo-page')) return;
  attemptNextPage();
});

/* ════════════════════════════════════════════════════
   PHOTO UPLOAD
════════════════════════════════════════════════════ */
const photoInput   = document.getElementById('photo-input');
const photoPH      = document.getElementById('photo-placeholder');
const photoRes     = document.getElementById('photo-result');
const photoImg     = document.getElementById('photo-img');
const uploadStatus = document.getElementById('upload-status');
let   savedPhotoUrl = null;

function triggerUpload(){ photoInput.click(); }

photoInput.addEventListener('change', async(e)=>{
  const file=e.target.files[0]; if(!file) return;
  const local=URL.createObjectURL(file);
  photoImg.src=local; photoPH.style.display='none'; photoRes.style.display='block';
  uploadStatus.textContent='SAVING...';
  try {
    const fd=new FormData(); fd.append('photo',file);
    const resp=await fetch('/upload-photo',{method:'POST',body:fd});
    const data=await resp.json();
    if(data.url){ URL.revokeObjectURL(local); photoImg.src=data.url; savedPhotoUrl=data.url; uploadStatus.textContent=''; }
    else { uploadStatus.textContent=data.error||'FAILED'; }
  } catch(err){ console.error(err); }
  photoInput.value='';
});

/* ════════════════════════════════════════════════════
   COMPLETE — pages suck back in, flap closes,
   envelope spins 5s, then redirect
════════════════════════════════════════════════════ */
function handleComplete() {
  if(!savedPhotoUrl){ uploadStatus.textContent='SAVE PHOTO FIRST'; return; }

  // 1. Disable all interaction
  state='completing';
  document.getElementById('pages-stack').style.pointerEvents='none';

  // 2. Animate all pages sucking back into envelope simultaneously
  pagesEl.forEach((p,i)=>{
    p.classList.remove('active');
    p.style.pointerEvents='none';
    setTimeout(()=>{
      p.classList.add('suck');
    }, i*80);
  });

  // Wait for all to finish (~total pages * 80 + 500ms suck anim)
  const suckTime = totalPages * 80 + 600;

  setTimeout(()=>{
    // 3. Close flap on static clone
    const sf=envStatic.querySelector('#flap');
    if(sf){
      sf.style.transition='transform 1.1s cubic-bezier(.4,0,.2,1)';
      sf.style.transformOrigin='160px 24px';
      sf.style.transform='rotateX(0deg)';
    }
  }, suckTime);

  // 4. Start spinning the envelope after flap closes
  setTimeout(()=>{
    // Move env-static to center of screen for spin
    openedLayout.style.justifyContent='center';
    openedLayout.style.alignItems='center';
    envStatic.style.marginRight='0';
    envStatic.classList.add('env-spinning');
  }, suckTime + 1300);

  // 5. After 5 seconds of spin, redirect to the redirect_url
  setTimeout(()=>{
    // Redirect to the URL passed from Flask
    const redirectUrl = document.body.dataset.redirectUrl || '/';
    window.location.href = redirectUrl;
  }, suckTime + 1300 + 5000);
}

/* ════════════════════════════════════════════════════
   FRAMED IMAGE REVEAL
   Pixel border frame drawn on canvas with random
   blue-tone shapes (rects & circles) only on a border
   band around the image. Image aspect ratio preserved.
════════════════════════════════════════════════════ */
function showFramedReveal() {
  const finalReveal = document.getElementById('final-reveal');
  const wrap        = document.getElementById('framed-image-wrap');
  const finalImg    = document.getElementById('final-img');
  const frameCanvas = document.getElementById('frame-canvas');

  finalImg.src = savedPhotoUrl;
  finalReveal.classList.add('active');
  openedLayout.style.display='none';
  sceneEl.style.display='none';

  finalImg.onload = () => {
    // Size the wrap to fill screen while preserving aspect ratio
    const natW = finalImg.naturalWidth;
    const natH = finalImg.naturalHeight;
    const ratio = natW / natH;
    const maxW  = Math.min(window.innerWidth  * .88, 900);
    const maxH  = Math.min(window.innerHeight * .88, 700);

    let dispW = maxW, dispH = maxW / ratio;
    if (dispH > maxH) { dispH = maxH; dispW = maxH * ratio; }
    dispW = Math.round(dispW); dispH = Math.round(dispH);

    wrap.style.width  = dispW + 'px';
    wrap.style.height = dispH + 'px';
    finalImg.style.width  = '100%';
    finalImg.style.height = '100%';
    finalImg.style.objectFit = 'cover';

    frameCanvas.width  = dispW;
    frameCanvas.height = dispH;
    frameCanvas.style.width  = dispW + 'px';
    frameCanvas.style.height = dispH + 'px';

    drawPixelFrame(frameCanvas, dispW, dispH);

    // Entrance animation
    setTimeout(()=>{ wrap.classList.add('reveal'); }, 50);
  };
}

function drawPixelFrame(canvas, W, H) {
  const ctx   = canvas.getContext('2d');
  const band  = Math.round(Math.min(W, H) * .12);   // border band width
  ctx.clearRect(0, 0, W, H);

  // Blue tone palette for frame shapes
  const blues = [
    [10,  40, 160],[14,  56, 200],[20,  72, 220],[30,  90, 240],
    [50, 120, 255],[80, 150, 255],[110,180, 255],[150,210, 255],
    [12,  30, 120],[8,   20,  90],[60, 100, 200],[100,140, 220],
    [170,220, 255],[200,230, 255],[8,   16,  70],[25,  55, 180],
  ];

  const rng = (a,b) => a + Math.random()*(b-a);

  // Only draw inside the border band
  // We'll scatter shapes; reject any that are fully inside inner rect
  const inner = { x1:band, y1:band, x2:W-band, y2:H-band };

  const shapeCount = Math.floor(W*H*.0018); // density scales with image size

  for (let s = 0; s < shapeCount; s++) {
    const col = blues[Math.floor(Math.random()*blues.length)];
    const alpha = 0.45 + Math.random() * 0.55;
    ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${alpha})`;

    // Random pixel-snapped size
    const snap = 2; // pixel grid size
    const sz = Math.round(rng(1,8)) * snap;

    // Random position — bias toward border
    let x, y;
    // Pick a border zone: 0=top,1=bottom,2=left,3=right
    const zone = Math.floor(Math.random()*4);
    if (zone===0)      { x=rng(0,W);      y=rng(0,band);   }
    else if (zone===1) { x=rng(0,W);      y=rng(H-band,H); }
    else if (zone===2) { x=rng(0,band);   y=rng(0,H);      }
    else               { x=rng(W-band,W); y=rng(0,H);      }

    x = Math.round(x/snap)*snap;
    y = Math.round(y/snap)*snap;

    // Shape type: rect (70%) or circle (30%)
    if (Math.random() < 0.7) {
      // Rectangle — vary aspect ratio
      const w = sz;
      const h = Math.round(rng(1,6))*snap;
      ctx.fillRect(x - w/2, y - h/2, w, h);
      // Optional 1px darker outline
      const darkerCol = blues[Math.floor(Math.random()*blues.length)];
      ctx.fillStyle = `rgba(${darkerCol[0]},${darkerCol[1]},${darkerCol[2]},${alpha*.5})`;
      ctx.fillRect(x - w/2 - 2, y - h/2 - 2, w+4, 2);   // top edge
      ctx.fillRect(x - w/2 - 2, y + h/2,     w+4, 2);   // bottom edge
    } else {
      // Circle (pixel approximation — rounded rect)
      const r = sz/2;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Add some bright accent pixels scattered in the border
  for (let a = 0; a < Math.round(shapeCount * .4); a++) {
    const zone = Math.floor(Math.random()*4);
    let x,y;
    if (zone===0)      { x=rng(0,W);      y=rng(0,band/2);     }
    else if (zone===1) { x=rng(0,W);      y=rng(H-band/2,H);   }
    else if (zone===2) { x=rng(0,band/2); y=rng(0,H);          }
    else               { x=rng(W-band/2,W); y=rng(0,H);        }
    ctx.fillStyle = `rgba(180,220,255,${.3+Math.random()*.5})`;
    ctx.fillRect(Math.round(x/2)*2, Math.round(y/2)*2, 2, 2);
  }
}
